<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --surface: #111111;
      --border:  #2a2a2a;
      --accent:  #e8ff47;
      --accent2: #ff4757;
      --text:    #f0f0f0;
      --muted:   #666;
      --radius:  4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    header { margin-bottom: 2.5rem; }

    .tag {
      font-size: .65rem;
      letter-spacing: .2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: .5rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.02em;
    }

    h1 span { color: var(--accent); }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 1.5rem;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .65rem .5rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      border-right: 1px solid var(--border);
    }

    .tab-btn:last-child { border-right: none; }

    .tab-btn.active {
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 700;
    }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Inputs ── */
    label {
      display: block;
      font-size: .7rem;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .5rem;
    }

    .input-row {
      display: flex;
      gap: .75rem;
      align-items: stretch;
      margin-bottom: 1.5rem;
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"],
    input[type="url"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: .85rem;
      padding: .75rem 1rem;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="tel"]:focus,
    input[type="email"]:focus,
    input[type="url"]:focus { border-color: var(--accent); }

    input::placeholder { color: var(--muted); }

    /* vCard grid */
    .vcard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .85rem;
      margin-bottom: 1.25rem;
    }

    .vcard-grid .full { grid-column: 1 / -1; }

    .field { display: flex; flex-direction: column; gap: .5rem; }

    /* options row */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    select, input[type="color"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      padding: .65rem .9rem;
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }

    select:focus, input[type="color"]:focus { border-color: var(--accent); }

    input[type="color"] {
      padding: .3rem .5rem;
      height: 2.5rem;
      width: 100%;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      border-radius: var(--radius);
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .75rem 1.25rem;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }

    .btn:hover { background: #d4eb3c; }
    .btn:active { transform: scale(.97); }
    .btn-full { width: 100%; margin-top: 1rem; }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      width: 100%;
      margin-top: .75rem;
    }

    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: transparent; }

    /* ── Result ── */
    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    #result.visible { display: flex; }

    #qr-wrap {
      background: #fff;
      padding: 1.5rem;
      border-radius: var(--radius);
      display: inline-block;
      position: relative;
    }

    #qr-wrap canvas, #qr-wrap img { display: block; }

    .corner {
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .result-actions { display: flex; flex-direction: column; width: 100%; gap: .5rem; }

    .status {
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      min-height: 1.2em;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .1em;
    }

    @keyframes pop {
      0%   { transform: scale(.9); opacity: 0; }
      100% { transform: scale(1);  opacity: 1; }
    }

    #result.visible { animation: pop .25s ease; }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <p class="tag">// утилита</p>
    <h1>QR<br><span>генератор</span></h1>
  </header>

  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('text')">Текст / URL</button>
      <button class="tab-btn"        onclick="switchTab('contact')">Контакт</button>
    </div>

    <!-- Panel: Text/URL -->
    <div class="panel active" id="panel-text">
      <div class="field" style="margin-bottom:1.5rem">
        <label for="qr-input">Текст или URL</label>
        <div class="input-row" style="margin-bottom:0">
          <input type="text" id="qr-input" placeholder="https://example.com" autocomplete="off" />
        </div>
      </div>
    </div>

    <!-- Panel: Contact (vCard) -->
    <div class="panel" id="panel-contact">
      <div class="vcard-grid">

        <div class="field">
          <label for="vc-first">Имя</label>
          <input type="text" id="vc-first" placeholder="Иван" />
        </div>

        <div class="field">
          <label for="vc-last">Фамилия</label>
          <input type="text" id="vc-last" placeholder="Иванов" />
        </div>

        <div class="field full">
          <label for="vc-org">Компания</label>
          <input type="text" id="vc-org" placeholder="ООО Ромашка" />
        </div>

        <div class="field full">
          <label for="vc-title">Должность</label>
          <input type="text" id="vc-title" placeholder="Менеджер по продажам" />
        </div>

        <div class="field">
          <label for="vc-phone">Телефон</label>
          <input type="tel" id="vc-phone" placeholder="+7 900 000 00 00" />
        </div>

        <div class="field">
          <label for="vc-phone2">Доп. телефон</label>
          <input type="tel" id="vc-phone2" placeholder="+7 800 000 00 00" />
        </div>

        <div class="field full">
          <label for="vc-email">Email</label>
          <input type="email" id="vc-email" placeholder="ivan@example.com" />
        </div>

        <div class="field full">
          <label for="vc-url">Сайт</label>
          <input type="url" id="vc-url" placeholder="https://example.com" />
        </div>

        <div class="field full">
          <label for="vc-addr">Адрес</label>
          <input type="text" id="vc-addr" placeholder="Москва, ул. Примерная, д. 1" />
        </div>

        <div class="field full">
          <label for="vc-note">Заметка</label>
          <input type="text" id="vc-note" placeholder="Любой текст" />
        </div>

      </div>
    </div>

    <!-- Shared options -->
    <div class="options">
      <div class="field">
        <label for="qr-size">Размер</label>
        <select id="qr-size">
          <option value="128">128 × 128</option>
          <option value="200" selected>200 × 200</option>
          <option value="256">256 × 256</option>
          <option value="400">400 × 400</option>
        </select>
      </div>
      <div class="field">
        <label for="qr-ec">Коррекция ошибок</label>
        <select id="qr-ec">
          <option value="L">L — низкая</option>
          <option value="M" selected>M — средняя</option>
          <option value="Q">Q — высокая</option>
          <option value="H">H — максимум</option>
        </select>
      </div>
      <div class="field">
        <label for="qr-dark">Цвет кода</label>
        <input type="color" id="qr-dark" value="#000000" />
      </div>
      <div class="field">
        <label for="qr-light">Фон</label>
        <input type="color" id="qr-light" value="#ffffff" />
      </div>
    </div>

    <button class="btn btn-full" onclick="generate()">→ Создать QR-код</button>
    <p class="status" id="status" style="margin-top:.9rem"></p>
  </div>

  <!-- Result -->
  <div class="card" id="result">
    <div id="qr-wrap">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div id="qr-output"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-outline" onclick="downloadQR()">↓ Скачать PNG</button>
    </div>
  </div>

  <footer>QR Generator · vCard 3.0 · qrcodejs · MIT License</footer>
</div>

<script>
let currentTab = 'text';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'contact'));
  });
  document.getElementById('panel-text').classList.toggle('active', tab === 'text');
  document.getElementById('panel-contact').classList.toggle('active', tab === 'contact');

  // For contacts use H level (logo overlay-safe), pre-select
  if (tab === 'contact') {
    document.getElementById('qr-ec').value = 'M';
  }

  // hide result on tab switch
  document.getElementById('result').classList.remove('visible');
  document.getElementById('status').textContent = '';
}

function buildVCard() {
  const v  = id => document.getElementById(id).value.trim();
  const first  = v('vc-first');
  const last   = v('vc-last');
  const org    = v('vc-org');
  const title  = v('vc-title');
  const phone  = v('vc-phone');
  const phone2 = v('vc-phone2');
  const email  = v('vc-email');
  const url    = v('vc-url');
  const addr   = v('vc-addr');
  const note   = v('vc-note');

  if (!first && !last && !phone && !email) return null;

  const fullName = [first, last].filter(Boolean).join(' ');

  let card = 'BEGIN:VCARD\r\nVERSION:3.0\r\n';
  card += `N:${last};${first};;;\r\n`;
  card += `FN:${fullName}\r\n`;
  if (org)    card += `ORG:${org}\r\n`;
  if (title)  card += `TITLE:${title}\r\n`;
  if (phone)  card += `TEL;TYPE=CELL:${phone}\r\n`;
  if (phone2) card += `TEL;TYPE=WORK:${phone2}\r\n`;
  if (email)  card += `EMAIL:${email}\r\n`;
  if (url)    card += `URL:${url}\r\n`;
  if (addr)   card += `ADR;TYPE=WORK:;;${addr};;;;\r\n`;
  if (note)   card += `NOTE:${note}\r\n`;
  card += 'END:VCARD';
  return card;
}

function ecLevel(val) {
  return { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H }[val];
}

function generate() {
  const status = document.getElementById('status');
  let text;

  if (currentTab === 'text') {
    text = document.getElementById('qr-input').value.trim();
    if (!text) {
      status.style.color = 'var(--accent2)';
      status.textContent = '// введите текст или URL';
      return;
    }
  } else {
    text = buildVCard();
    if (!text) {
      status.style.color = 'var(--accent2)';
      status.textContent = '// заполните хотя бы имя, телефон или email';
      return;
    }
  }

  const size  = parseInt(document.getElementById('qr-size').value);
  const ec    = document.getElementById('qr-ec').value;
  const dark  = document.getElementById('qr-dark').value;
  const light = document.getElementById('qr-light').value;

  const out = document.getElementById('qr-output');
  out.innerHTML = '';

  new QRCode(out, {
    text,
    width: size,
    height: size,
    colorDark: dark,
    colorLight: light,
    correctLevel: ecLevel(ec),
  });

  const label = currentTab === 'contact' ? 'vCard · ' : '';
  status.style.color = 'var(--accent)';
  status.textContent = `// готово · ${label}${size}×${size}px`;

  const result = document.getElementById('result');
  result.classList.remove('visible');
  void result.offsetWidth;
  result.classList.add('visible');
}

function downloadQR() {
  const canvas = document.querySelector('#qr-output canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = currentTab === 'contact' ? 'contact-qr.png' : 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

document.getElementById('qr-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
